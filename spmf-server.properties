# =============================================
# SPMF-Server Configuration
# =============================================

# Network
server.port=8585
server.host=0.0.0.0

# Thread pool
executor.coreThreads=4
executor.maxThreads=8

# Job lifecycle
job.ttlMinutes=30
job.maxQueueSize=100

# File handling
work.dir=./spmf-work
input.maxSizeMb=50

# Security: leave blank to disable API key check
security.apiKey=

# Logging  (OFF / SEVERE / WARNING / INFO / FINE / FINER / FINEST / ALL)
log.level=INFO
log.file=./logs/spmf-server.log
# =============================================
# SPMF-Server Configuration
# =============================================
# All properties are optional.
# Any property that is absent or invalid falls
# back to the built-in default shown below.
# =============================================

# ── Network ────────────────────────────────────────────────────────────────
# TCP port the HTTP server listens on.
# Valid range: 1 – 65535
server.port=8585

# Bind address. Use 0.0.0.0 to listen on all interfaces,
# or a specific IP (e.g. 127.0.0.1) to restrict access.
server.host=0.0.0.0

# ── Thread Pool ────────────────────────────────────────────────────────────
# Number of always-alive worker threads in the job executor pool.
# Must be >= 1.
executor.coreThreads=4

# Maximum worker threads created under peak load.
# Must be >= executor.coreThreads.
executor.maxThreads=8

# ── Job Lifecycle ──────────────────────────────────────────────────────────
# How long (minutes) a FINISHED job (DONE or FAILED) is retained in memory
# and on disk before the background cleaner automatically purges it.
# This is the POST-COMPLETION retention time — it is NOT the execution
# timeout.  Must be >= 1.
job.ttlMinutes=30

# Maximum wall-clock time (minutes) an algorithm child process is allowed
# to run before it is forcibly killed (SIGTERM → SIGKILL).
# This is the EXECUTION timeout — it is independent of job.ttlMinutes.
# Must be >= 1.
job.timeoutMinutes=10

# Maximum number of jobs that may wait in the submission queue before
# new submissions are rejected with HTTP 503.
# Must be >= 1.
job.maxQueueSize=100

# ── File Handling ──────────────────────────────────────────────────────────
# Directory where per-job subdirectories (input.txt, output.txt,
# console.log, args.txt) are created.  Created automatically if absent.
work.dir=./spmf-work

# Maximum size (MB) accepted for a single uploaded input file.
# Requests that exceed this limit are rejected with HTTP 413.
# Must be >= 1.
input.maxSizeMb=50

# ── Security ───────────────────────────────────────────────────────────────
# Optional API key for request authentication.
# When set, every API request must include the header:
#   X-API-Key: <value>
# Leave blank (or omit the property) to disable authentication entirely.
security.apiKey=

# ── Logging ────────────────────────────────────────────────────────────────
# Java Util Logging level for the server process.
# Valid values (coarsest to finest):
#   OFF  SEVERE  WARNING  INFO  FINE  FINER  FINEST  ALL
log.level=INFO

# Path to the rotating log file.
# Leave blank to disable file-based logging (console only).
log.file=./logs/spmf-server.log